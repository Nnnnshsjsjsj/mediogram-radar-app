name: Deploy Pages

on:
  push:
    branches: [main]     # every push (incl. the radar bot's feed pushes) redeploys
  workflow_dispatch:      # + a manual button

permissions:
  contents: read
  pages: write
  id-token: write

# Serialize deploys so rapid pushes queue instead of racing/failing.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .          # repo root: index.html + out/latest.json + out/stats.json

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
