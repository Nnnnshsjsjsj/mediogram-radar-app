.hdr .upd b{color:#fff;font-weight:600}
/* ECG signature line */
.ecg{height:34px;width:100%;margin-top:6px;display:block;overflow:visible}
.ecg path{fill:none;stroke:var(--teal);stroke-width:1.6;opacity:.55}
.ecg .spike{stroke:var(--red);opacity:.95;stroke-width:2}

/* stat strip */
.stats{display:flex;gap:0;background:var(--navy);color:#fff;
  padding:2px 18px 15px;border-bottom:1px solid rgba(255,255,255,.08)}
.stat{flex:1;display:flex;flex-direction:column;gap:1px}
.stat .n{font-family:Archivo;font-weight:800;font-size:26px;line-height:1}
.stat .l{font-size:10.5px;letter-spacing:.7px;text-transform:uppercase;color:#8FA6BF}
.stat.hot .n{color:#FF6B7A}
.stat + .stat{border-left:1px solid rgba(255,255,255,.1);padding-left:16px}
.stat:not(:last-child){margin-right:16px}

/* ---------- filter tabs ---------- */
.tabs{position:sticky;top:0;z-index:10;display:flex;gap:8px;padding:12px 16px;
  background:var(--paper);border-bottom:1px solid var(--line);overflow-x:auto}
.tab{flex:0 0 auto;font-family:Barlow Semi Condensed;font-weight:700;font-size:14px;
  letter-spacing:.3px;text-transform:uppercase;color:var(--sub);
  padding:7px 13px;border:1px solid var(--line);border-radius:999px;background:#fff}
.tab.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.tab.on.hot{background:var(--red);border-color:var(--red)}

/* ---------- list ---------- */
.wrap{padding:8px 14px 40px}
.lead{position:relative;background:var(--card);border:1px solid var(--line);
  border-radius:14px;padding:14px 15px 14px 18px;margin:11px 0;
  box-shadow:0 1px 2px rgba(16,38,63,.04)}
.lead::before{content:"";position:absolute;left:0;top:14px;bottom:14px;width:4px;
  border-radius:4px;background:var(--sub2)}
.lead.HOT::before{background:var(--red)}
.lead.WARM::before{background:var(--amber)}
.lead.WATCH::before{background:var(--teal)}
.lead-top{display:flex;align-items:baseline;gap:10px}
.scorebox{font-family:Archivo;font-weight:800;font-size:22px;line-height:1;color:var(--navy)}
.tierlab{font-family:Barlow Semi Condensed;font-weight:700;font-size:10.5px;
  letter-spacing:1px;padding:3px 7px;border-radius:5px;text-transform:uppercase}
.tierlab.HOT{background:#FDE7EA;color:var(--red)}
.tierlab.WARM{background:#F7EDDA;color:var(--amber)}
.tierlab.WATCH{background:#E6F0F8;color:var(--teal)}
.posted{margin-left:auto;font-size:11px;color:var(--sub2)}
.sponsor{font-family:Archivo;font-weight:700;font-size:16.5px;margin:9px 0 2px;letter-spacing:.1px}
.title{font-size:13.5px;color:var(--sub);line-height:1.4}
.summary{font-size:13.5px;line-height:1.5;margin:10px 0 0;color:var(--ink)}
.meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px}
.chip{font-size:11px;font-weight:500;color:var(--sub);background:#F1F4F8;
  border:1px solid var(--line);border-radius:6px;padding:3px 8px}
.chip.status{color:var(--navy);font-weight:600}
.chip.open{background:#E8F5EF;color:var(--green);border-color:#CDE9DD}

/* expandable detail */
.detail{max-height:0;overflow:hidden;transition:max-height .28s ease}
.lead.open .detail{max-height:640px}
.detail-in{border-top:1px solid var(--line);margin-top:13px;padding-top:12px}
.drow{margin:9px 0}
.dlabel{font-family:Barlow Semi Condensed;font-weight:700;font-size:11px;
  letter-spacing:.8px;text-transform:uppercase;color:var(--teal);margin-bottom:2px}
.dval{font-size:13.5px;line-height:1.5;color:var(--ink)}
.opener{background:var(--paper);border:1px solid var(--line);border-radius:10px;
  padding:11px 12px;font-size:13.5px;line-height:1.55;color:var(--ink)}
.acts{display:flex;gap:9px;margin-top:12px;flex-wrap:wrap}
.btn{flex:1;min-width:120px;text-align:center;font-family:Barlow Semi Condensed;
  font-weight:700;font-size:14px;letter-spacing:.4px;text-transform:uppercase;
  padding:11px;border-radius:10px;border:1px solid var(--navy);color:var(--navy);background:#fff}
.btn.primary{background:var(--navy);color:#fff}
.btn.copy.done{background:var(--green);border-color:var(--green);color:#fff}
.expand{margin-top:11px;font-size:12.5px;color:var(--teal);font-weight:600;
  display:flex;align-items:center;gap:5px}
.expand .arw{transition:transform .25s}
.lead.open .expand .arw{transform:rotate(90deg)}

/* funding section */
.sechead{font-family:Archivo;font-weight:800;font-size:13px;letter-spacing:1.2px;
  text-transform:uppercase;color:var(--sub2);margin:26px 4px 4px}
.fund{background:var(--card);border:1px solid var(--line);border-radius:12px;
  padding:12px 14px;margin:9px 0}
.fund .co{font-family:Archivo;font-weight:700;font-size:15px}
.fund .amt{color:var(--teal);font-weight:700;font-size:13px;margin-left:6px}
.fund .what{font-size:12.5px;color:var(--sub);margin-top:3px;line-height:1.4}
.fund .ang{font-size:12.5px;color:var(--ink);margin-top:6px;line-height:1.45}

/* states */
.state{text-align:center;color:var(--sub);padding:60px 30px;font-size:14px;line-height:1.6}
.state .big{font-family:Archivo;font-weight:700;color:var(--navy);font-size:17px;margin-bottom:6px}
.skel{height:120px;background:linear-gradient(100deg,#eef1f5 30%,#f6f8fb 50%,#eef1f5 70%);
  background-size:200% 100%;animation:sh 1.2s infinite;border-radius:14px;margin:11px 0}
@keyframes sh{to{background-position:-200% 0}}
.refresh{position:fixed;right:16px;bottom:calc(18px + env(safe-area-inset-bottom));
  width:52px;height:52px;border-radius:50%;background:var(--navy);color:#fff;border:none;
  box-shadow:0 6px 18px rgba(16,38,63,.28);font-size:20px;z-index:30}
.refresh.spin{animation:rot .8s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>

</main>

<button class="refresh" id="refresh" aria-label="Refresh">⟳</button>

<script>
// ====== CONFIG — set these two to YOUR repo, then the app self-updates ======
const GH_USER = "Nnnnshsjsjsj";
const GH_REPO = "mediogram-radar-app";
const GH_BRANCH = "main";
// ===========================================================================
const FEED_URL = `https://raw.githubusercontent.com/${GH_USER}/${GH_REPO}/${GH_BRANCH}/latest.json`;

let DATA=null, filter="all";
const $=id=>document.getElementById(id);
const esc=s=>(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

function timeAgo(iso){
  if(!iso) return "—";
  const t=new Date(iso), d=(Date.now()-t)/1000;
  if(d<3600) return Math.max(1,Math.floor(d/60))+" min ago";
  if(d<86400) return Math.floor(d/3600)+" h ago";
  return Math.floor(d/86400)+" d ago";
}

function drawEcg(hot){
  // baseline with a number of spikes = hot count (min 1), ties viz to the day
  const w=360,h=34,mid=h/2,n=Math.max(1,Math.min(hot||1,6));
  let d=`M0 ${mid} `, x=20, gap=(w-40)/n;
  for(let i=0;i<n;i++){
    const cx=x+gap*i+gap/2;
    d+=`L ${cx-26} ${mid} L ${cx-14} ${mid-4} L ${cx-6} ${mid+7} L ${cx} ${mid-13} L ${cx+7} ${mid+11} L ${cx+16} ${mid-3} L ${cx+26} ${mid} `;
  }
  d+=`L ${w} ${mid}`;
  $("ecg").innerHTML=`<path d="${d}"/><path class="spike" d="${d}" stroke-dasharray="2 700"/>`;
}

function leadCard(d){
  const openChip = d.status==="NOT_YET_RECRUITING"
    ? `<span class="chip open">Sites still open</span>`
    : `<span class="chip status">${esc(d.status.replace(/_/g,' ').toLowerCase())}</span>`;
  const geo = d.countries&&d.countries.length ? d.countries.slice(0,3).join(', ') : 'no sites listed';
  const summary = d.summary || d.title;
  const opener = d.opener ? `
    <div class="drow"><div class="dlabel">Ready opener</div>
      <div class="opener" id="op-${d.nct}">${esc(d.opener)}</div></div>` : "";
  const channel = d.channel ? `<div class="drow"><div class="dlabel">Best way in</div><div class="dval">${esc(d.channel)}${d.who?` — ${esc(d.who)}`:''}</div></div>`:"";
  const angle = d.angle ? `<div class="drow"><div class="dlabel">Angle</div><div class="dval">${esc(d.angle)}</div></div>`:"";
  const contact = (d.email||d.pi) ? `<div class="drow"><div class="dlabel">Contact</div><div class="dval">${d.email?esc(d.contact_name?d.contact_name+' · ':'')+esc(d.email):''}${d.pi?`<br>PI: ${esc(d.pi)}`:''}</div></div>`:"";
  const mailBtn = d.email
    ? `<a class="btn primary" href="mailto:${esc(d.email)}?subject=${encodeURIComponent('Mediogram — '+d.sponsor)}&body=${encodeURIComponent(d.opener||'')}">Email</a>`
    : "";
  const copyBtn = d.opener ? `<button class="btn copy" data-copy="${d.nct}">Copy opener</button>`:"";
  return `<article class="lead ${d.tier}" data-tier="${d.tier}" id="l-${d.nct}">
    <div class="lead-top">
      <span class="scorebox">${d.score}</span>
      <span class="tierlab ${d.tier}">${d.tier}</span>
      <span class="posted">${d.posted||''}</span>
    </div>
    <div class="sponsor">${esc(d.sponsor)||'Unknown sponsor'}</div>
    <div class="title">${esc(d.title)}</div>
    <div class="summary">${esc(summary)}</div>
    <div class="meta">
      ${openChip}
      <span class="chip">${esc(d.phase||'NA')}</span>
      <span class="chip">${esc(geo)}</span>
    </div>
    <div class="expand" data-toggle="${d.nct}"><span class="arw">▸</span> Outreach plan</div>
    <div class="detail"><div class="detail-in">
      ${channel}${angle}${contact}${opener}
      <div class="acts">${mailBtn}${copyBtn}<a class="btn" href="${esc(d.url)}" target="_blank" rel="noopener">Open trial</a></div>
    </div></div>
  </article>`;
}

function fundCard(f){
  return `<div class="fund">
    <div><span class="co">${esc(f.company)}</span>${f.amount?`<span class="amt">${esc(f.amount)}</span>`:''}</div>
    ${f.what?`<div class="what">${esc(f.what)}</div>`:''}
    ${f.angle?`<div class="ang">${esc(f.angle)}</div>`:''}
    <div class="acts" style="margin-top:10px"><a class="btn" href="${esc(f.link)}" target="_blank" rel="noopener">Read news</a></div>
  </div>`;
}

function render(){
  if(!DATA){return;}
  const c=DATA.counts||{};
  $("s-hot").textContent=c.hot??0; $("s-warm").textContent=c.warm??0;
  $("s-new").textContent=c.new_leads??0; $("s-fund").textContent=c.funding??0;
  $("upd").innerHTML=`Updated<br><b>${timeAgo(DATA.updated)}</b>`;
  drawEcg(c.hot);

  const list=$("list");
  if(filter==="fund"){
    const f=DATA.funding||[];
    list.innerHTML = f.length ? `<div class="sechead">Recently funded — future leads</div>`+f.map(fundCard).join("")
      : `<div class="state"><div class="big">No funding news yet</div>New rounds appear here as the bot finds them.</div>`;
    return;
  }
  let leads=(DATA.leads||[]);
  if(filter!=="all") leads=leads.filter(l=>l.tier===filter);
  if(!leads.length){
    list.innerHTML=`<div class="state"><div class="big">Nothing in this tier today</div>Try “All”, or pull to refresh after the next run.</div>`;
    return;
  }
  list.innerHTML=leads.map(leadCard).join("");
}

function wire(){
  $("tabs").addEventListener("click",e=>{
    const b=e.target.closest(".tab"); if(!b)return;
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("on"));
    b.classList.add("on"); filter=b.dataset.f; render();
  });
  $("list").addEventListener("click",e=>{
    const tg=e.target.closest("[data-toggle]");
    if(tg){ $("l-"+tg.dataset.toggle).classList.toggle("open"); return; }
    const cp=e.target.closest("[data-copy]");
    if(cp){
      const el=$("op-"+cp.dataset.copy); if(!el)return;
      navigator.clipboard.writeText(el.textContent).then(()=>{
        cp.classList.add("done"); cp.textContent="Copied ✓";
        setTimeout(()=>{cp.classList.remove("done");cp.textContent="Copy opener";},1600);
      });
    }
  });
  $("refresh").addEventListener("click",()=>load(true));
}

async function load(manual){
  const btn=$("refresh"); if(manual)btn.classList.add("spin");
  try{
    const r=await fetch(FEED_URL+"?t="+Date.now(),{cache:"no-store"});
    if(!r.ok) throw new Error(r.status);
    DATA=await r.json();
    localStorage.setItem("radar_cache",JSON.stringify(DATA));
    render();
  }catch(err){
    const cached=localStorage.getItem("radar_cache");
    if(cached){ DATA=JSON.parse(cached); render();
      $("upd").innerHTML=`Offline<br><b>cached</b>`;
    } else {
      $("list").innerHTML=`<div class="state"><div class="big">Can’t reach the feed</div>
        Check that the bot has run and <code>out/latest.json</code> exists in the repo,
        and that GH_USER / GH_REPO are set correctly in the app.</div>`;
    }
  }finally{ if(manual)setTimeout(()=>btn.classList.remove("spin"),500); }
}

wire(); load(false);
setInterval(()=>load(false), 1000*60*30); // auto-refresh every 30 min when open
</script>
</body>
</html>
